<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>我的选课</title>
    <script>
        function del(id) {
            if(confirm("确定退课吗")){
                $.ajax({
                    type: "GET",
                    url: "delete?id="+id,
                    success: function (data) {
                        alert(data.message);
                        if(data.success){
                            location.href="myCourses";
                        }
                    },
                    error: function () {
                        alert("请求服务器失败，请检查Java控制台报错!");
                    }
                });
            }
        }
    </script>
</head>

<body data-theme="default">
<div layout:fragment="content">

    <div class="container-fluid">

        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header"><h4>我的选课</h4></div>

                    <div class="card-body">
                        <form class="form-inline" action="/courseSelection/myCourses" method="get">
                            <input type="hidden" name="current" th:value="${pager.getPageIndex() }"/>
                            <input type="hidden" name="limit" th:value="${pager.getPageSize() }"/>
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>课程名称</th>
                                        <th>成绩</th>
                                        <th>评价</th>
                                        <th>选课时间</th>
                                        <th>操作</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    <tr th:each="i,s : ${ courseSelectionList }">
                                        <th scope="row" th:text="${i.id}"></th>
                                        <td th:text="${ i.courseName }"></td>
                                        <td th:text="${ i.score != null ? i.score : '未打分' }"></td>
                                        <td th:text="${ i.evaluation != null ? i.evaluation : '无' }"></td>
                                        <td th:text="${#dates.format( i.selectionTime ,'yyyy-MM-dd HH:mm:ss')}"></td>
                                        <td>
                                            <a th:href="${ '/course/detail?id='+ i.courseId}" class="btn btn-xs btn-success">查看课程</a>
                                            <button type="button" th:onclick="del([[${i.id}]])" class="btn btn-xs btn-danger">退课
                                            </button>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </form>
                        <div th:insert="~{_pager_footer::pagebar(pager=${pager},formId='page_form')}"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
