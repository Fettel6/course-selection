<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>选课管理 详情页</title>
</head>

<body data-theme="default">
<div layout:fragment="content">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header"><h4>选课管理详情</h4></div>
                    <div class="card-body">
                        <form class="form-horizontal">
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">学生姓名</label>
                                <div class="col-lg-3 col-xs-9">
                                    <p class="form-control-static" th:text="${ item.studentName }"></p>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">课程名称</label>
                                <div class="col-lg-3 col-xs-9">
                                    <p class="form-control-static" th:text="${ item.courseName }"></p>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">成绩</label>
                                <div class="col-lg-3 col-xs-9">
                                    <p class="form-control-static" th:text="${ item.score != null ? item.score : '未打分' }"></p>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">评价</label>
                                <div class="col-lg-3 col-xs-9">
                                    <p class="form-control-static" th:text="${ item.evaluation != null ? item.evaluation : '无' }"></p>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">选课时间</label>
                                <div class="col-lg-3 col-xs-9">
                                    <p class="form-control-static" th:text="${#dates.format(item.selectionTime ,'yyyy-MM-dd HH:mm:ss')}"></p>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-lg-3 col-xs-6 col-xs-offset-3">
                                    <a class="btn btn-default" href="list">返回列表</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
