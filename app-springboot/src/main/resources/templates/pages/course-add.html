<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>课程 新增页</title>
    <script>
        $(document).ready(function() {
            var options = {
                beforeSubmit:  ()=>{return true},
                success: function (data) {
                    alert(data.message);
                    if (data.success) {
                        window.location.href = "list";
                    }
                }
            };
            $('#editForm').ajaxForm(options).submit(function(){return false;});
        });
    </script>
</head>

<body data-theme="default">
<div layout:fragment="content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header"><h4>课程信息管理</h4></div>
                    <div class="card-body">
                        <form autocomplete="off" id="editForm" class="form-horizontal" action="/course/save"
                              method="post">
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">课程号</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input required maxlength="20" class="form-control w200"
                                           type="text" name="courseno" placeholder="请输入课程号">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">课程名称</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input required maxlength="50" class="form-control w200"
                                           type="text" name="name" placeholder="请输入课程名称">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">学分</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input required class="form-control w200"
                                           type="number" step="0.5" name="credit" placeholder="请输入学分">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">任课教师</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input maxlength="20" class="form-control w200"
                                           type="text" name="teacher" placeholder="请输入任课教师">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">课程描述</label>
                                <div class="col-lg-3 col-xs-9">
                                    <textarea maxlength="500" class="form-control w200"
                                              name="description" placeholder="请输入课程描述" rows="4"></textarea>
                                </div>
                            </div>

                            <div class="form-group">
                                <div class="col-lg-3 col-xs-6 col-xs-offset-3">
                                    <input class="btn btn-primary" type="submit" value="保存">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="/static/assets/js/bootstrap-datetimepicker/moment.min.js"></script>
<script src="/static/assets/js/bootstrap-datetimepicker/bootstrap-datetimepicker.min.js"></script>
<script src="/static/assets/js/bootstrap-datetimepicker/locale/zh-cn.js"></script>
</body>
</html>
