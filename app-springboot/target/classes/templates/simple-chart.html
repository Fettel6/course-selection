<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>简单ECharts测试</title>
    <style>
        body {
            margin: 20px;
        }
        #chart {
            width: 600px;
            height: 400px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>简单ECharts测试</h1>
    <div id="chart"></div>
    
    <script src="/static/assets/js/echarts.min.js"></script>
    <script>
        console.log('ECharts script loaded');
        
        window.onload = function() {
            console.log('Window loaded');
            var chart = echarts.init(document.getElementById('chart'));
            console.log('Chart initialized:', chart);
            
            var option = {
                title: {
                    text: '测试图表'
                },
                xAxis: {
                    data: ['A', 'B', 'C', 'D', 'E']
                },
                yAxis: {},
                series: [{
                    data: [10, 20, 30, 40, 50],
                    type: 'bar'
                }]
            };
            
            chart.setOption(option);
            console.log('Chart rendered');
        };
    </script>
</body>
</html>
