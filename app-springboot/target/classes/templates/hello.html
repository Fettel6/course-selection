<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>主页</title>
    <style>
        .card {
            margin-bottom: 20px;
        }
        #scoreChart {
            width: 100%;
            height: 400px;
        }
    </style>
</head>

<body data-theme="default">
<div layout:fragment="content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header"><h4>欢迎您，亲爱的[[${ session.user.rolech}]]！</h4></div>
                    <div class="card-body">
                        <p>课程数量: <span th:text="${courseScoreData.size}"></span></p>
                        <div th:if="${courseScoreData.size > 0}">
                            <h5>课程列表：</h5>
                            <ul>
                                <li th:each="course : ${courseScoreData}" th:text="${course.courseName}"></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header"><h4>课程分数分布统计</h4></div>
                    <div class="card-body">
                        <div id="scoreChart"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script>
    // 页面加载完成后初始化图表
    window.onload = function() {
        // 初始化ECharts实例
        var chart = echarts.init(document.getElementById('scoreChart'));
        
        // 简单的配置项
        var option = {
            xAxis: {
                type: 'category',
                data: ['高等数学', '大学英语', '计算机基础']
            },
            yAxis: {
                type: 'value'
            },
            series: [{
                data: [8, 10, 7],
                type: 'bar'
            }]
        };
        
        // 使用配置项显示图表
        chart.setOption(option);
    };
</script>
</body>
</html>
