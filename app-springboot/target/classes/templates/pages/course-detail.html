<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>详情-课程</title>
</head>

<body data-theme="default">
<div layout:fragment="content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header"><h4>课程 详情</h4></div>
                    <div class="card-body">
                        <form class="form-horizontal">
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">课程号</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input readonly class="form-control w200" type="text" name="courseno"
                                           th:value="${ item.courseno }">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">课程名称</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input readonly class="form-control w200" type="text" name="name"
                                           th:value="${ item.name }">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">学分</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input readonly class="form-control w200" type="text" name="credit"
                                           th:value="${ item.credit }">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">任课教师</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input readonly class="form-control w200" type="text" name="teacher"
                                           th:value="${ item.teacher }">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">课程描述</label>
                                <div class="col-lg-3 col-xs-9">
                                    <textarea readonly class="form-control w200" rows="4"
                                              th:text="${ item.description }"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">创建时间</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input readonly class="form-control w200" type="text" name="createtime"
                                           th:value="${#dates.format( item.createtime ,'yyyy-MM-dd HH:mm:ss')}">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
