<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/web/thymeleaf/layout"
      layout:decorate="layout">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>选课管理 编辑页</title>
    <script>
        $(document).ready(function() {
            var options = {
                beforeSubmit:  ()=>{return true},
                success: function (data) {
                    alert(data.message);
                    if (data.success) {
                        window.location.href = "list";
                    }
                }
            };
            $('#editForm').ajaxForm(options).submit(function(){return false;});
        });
    </script>
</head>

<body data-theme="default">
<div layout:fragment="content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header"><h4>选课管理修改</h4></div>
                    <div class="card-body">
                        <form autocomplete="off" id="editForm" class="form-horizontal" action="/courseSelection/save"
                              method="post">
                            <input type="hidden" name="id" th:value="${ item?.id }">
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">学生姓名</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input readonly class="form-control w200"
                                           type="text" th:value="${ item.studentName }">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">课程名称</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input readonly class="form-control w200"
                                           type="text" th:value="${ item.courseName }">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">成绩</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input class="form-control w200"
                                           type="number" step="0.5" min="0" max="100" name="score" placeholder="请输入成绩"
                                           th:value="${ item.score }">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">评价</label>
                                <div class="col-lg-3 col-xs-9">
                                    <textarea maxlength="500" class="form-control w200"
                                              name="evaluation" placeholder="请输入评价" rows="4"
                                              th:text="${ item.evaluation }"></textarea>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="control-label col-lg-3 col-xs-3">选课时间</label>
                                <div class="col-lg-3 col-xs-9">
                                    <input readonly class="w200 form-control js-datetimepicker" type="text"
                                           autocomplete="off" name="selectionTime" placeholder="请选择选课时间"
                                           th:value="${#dates.format(item.selectionTime ,'yyyy-MM-dd HH:mm:ss')}"
                                           data-side-by-side="true" data-locale="zh-cn"
                                           data-format="YYYY-MM-DD HH:mm:ss"/>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="col-lg-3 col-xs-6 col-xs-offset-3">
                                    <input class="btn btn-primary" type="submit" value="保存">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="/static/assets/js/bootstrap-datetimepicker/moment.min.js"></script>
<script src="/static/assets/js/bootstrap-datetimepicker/bootstrap-datetimepicker.min.js"></script>
<script src="/static/assets/js/bootstrap-datetimepicker/locale/zh-cn.js"></script>
</body>
</html>
